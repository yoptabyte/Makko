# Markko Worker config

# --- Database (MySQL via Doobie) ---
markko.database {
  url = "jdbc:mysql://localhost:3306/markko?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  url = ${?DB_URL}
  url = ${?markko.database.url}
  user = "markko"
  user = ${?DB_USER}
  user = ${?MYSQL_USER}
  user = ${?markko.database.user}
  password = ${?DB_PASSWORD}
  password = ${?MYSQL_PASSWORD}
  password = ${?markko.database.password}
  pool-size = 5
  pool-size = ${?markko.database.pool-size}
}

# --- Redis ---
markko.redis {
  uri = "redis://localhost:6379"
  uri = ${?REDIS_URI}
  uri = ${?markko.redis.uri}
  password = ${?REDIS_PASSWORD}
  password = ${?markko.redis.password}
}

# --- Elasticsearch ---
markko.elasticsearch {
  host = "localhost"
  host = ${?ES_HOST}
  host = ${?markko.elasticsearch.host}
  port = 9200
  port = ${?ES_PORT}
  port = ${?markko.elasticsearch.port}
  scheme = "http"
  scheme = ${?markko.elasticsearch.scheme}
  username = "elastic"
  username = ${?ES_USERNAME}
  username = ${?markko.elasticsearch.username}
  password = ${?ES_PASSWORD}
  password = ${?ELASTIC_PASSWORD}
  password = ${?markko.elasticsearch.password}
}

# --- Obsidian Vault ---
markko.vault {
  base-path = "./vault"
  base-path = ${?markko.vault.base-path}
  enable-system-picker = false
  enable-system-picker = ${?MARKKO_ENABLE_SYSTEM_PICKER}
  enable-system-picker = ${?markko.vault.enable-system-picker}
  allow-absolute-export-paths = false
  allow-absolute-export-paths = ${?MARKKO_ALLOW_ABSOLUTE_EXPORT_PATHS}
  allow-absolute-export-paths = ${?markko.vault.allow-absolute-export-paths}
}

# --- Pekko ---
pekko {
  loglevel = "INFO"

  actor {
    # Use "local" for single-node, "cluster" for Pekko Cluster
    provider = "local"
    provider = ${?PEKKO_PROVIDER}

    serialization-bindings {
      "java.io.Serializable" = jackson-json
    }
  }

  # Pekko Cluster config (active when PEKKO_PROVIDER=cluster)
  cluster {
    seed-nodes = [
      "pekko://markko-worker@127.0.0.1:2551"
    ]
    seed-nodes = ${?PEKKO_SEED_NODES}

    # Downing: auto-down unreachable nodes after timeout
    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"

    roles = ["worker"]
  }

  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      hostname = ${?PEKKO_HOSTNAME}
      port = 2551
      port = ${?PEKKO_PORT}
    }
  }
}
