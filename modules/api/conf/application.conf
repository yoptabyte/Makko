# Play Application Configuration
play.http.secret.key = "changeme-markko-dev-secret-key-at-least-32-chars"
play.http.secret.key = ${?APPLICATION_SECRET}
play.filters.hosts.allowed = ["localhost", "127.0.0.1", "."]
play.filters.disabled += "play.filters.csrf.CSRFFilter"
play.filters.enabled += "play.filters.cors.CORSFilter"
play.modules.enabled += "modules.DatabaseModule"
play.modules.enabled += "modules.RedisModule"
play.modules.enabled += "modules.SilhouetteModule"
play.http.filters = "modules.Filters"

# Database Configuration
markko.database {
  url = "jdbc:mysql://localhost:3306/markko?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  url = ${?DB_URL}
  user = "markko"
  user = ${?DB_USER}
  user = ${?MYSQL_USER}
  password = ${?DB_PASSWORD}
  password = ${?MYSQL_PASSWORD}
  pool-size = 10
  pool-size = ${?DB_POOL_SIZE}
}

# Redis Configuration
markko.redis {
  uri = ${?REDIS_URI}
  host = "localhost"
  port = 6379
  password = ${?REDIS_PASSWORD}
}

# Elasticsearch Configuration
markko.elasticsearch {
  host = "localhost"
  host = ${?ES_HOST}
  port = 9200
  port = ${?ES_PORT}
  scheme = "http"
  username = "elastic"
  username = ${?ES_USERNAME}
  password = ${?ES_PASSWORD}
  password = ${?ELASTIC_PASSWORD}
}

# Obsidian vault path
markko.vault {
  base-path = "./vault"
  enable-system-picker = false
  enable-system-picker = ${?MARKKO_ENABLE_SYSTEM_PICKER}
  allow-absolute-export-paths = false
  allow-absolute-export-paths = ${?MARKKO_ALLOW_ABSOLUTE_EXPORT_PATHS}
}

# Rate Limiting Configuration
markko.rate-limit {
  auth {
    window-size-seconds = 300
    max-requests = 10
  }
  general {
    window-size-seconds = 60
    max-requests = 100
  }
  search {
    window-size-seconds = 60
    max-requests = 30
  }
}

# JWT Configuration
markko.jwt {
  field-name = "token"
  issuer = "markko-api"
  authenticator-expiry = "24 hours"
  refresh-token-expiry = "30 days"
  shared-secret = ${play.http.secret.key}
}

# Logging
play.logger.root = INFO
play.logger.application = DEBUG

# CORS (if needed)
play.filters.cors {
  pathPrefixes = ["/"]
  allowedOrigins = ["http://localhost:3000", "http://localhost:4173", "http://localhost:8080"]
  allowedOriginPatterns = [
    "http://127\\.0\\.0\\.1:.*",
    "http://localhost:.*",
    "chrome-extension://.*",
    "moz-extension://.*"
  ]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Authorization", "Content-Type"]
  preflightMaxAge = 3 days
}
