global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'markko-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9000']
        labels:
          service: 'api'

  - job_name: 'markko-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9095']
        labels:
          service: 'worker'
